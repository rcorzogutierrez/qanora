<div class="flex min-h-screen items-center justify-center bg-brand-50 px-4">
  <div class="w-full max-w-sm rounded-lg bg-white p-8 shadow">
    <h1 class="mb-2 text-xl font-semibold text-brand-900">Creá tu cuenta</h1>
    <p class="mb-6 text-sm text-brand-900">14 días de prueba gratis, sin tarjeta.</p>

    <form [formGroup]="form" (ngSubmit)="submit()" class="space-y-4">
      <div>
        <label for="email" class="block text-sm font-medium text-brand-900">Email</label>
        <input
          id="email"
          type="email"
          formControlName="email"
          class="mt-1 w-full rounded border border-brand-200 px-3 py-2 focus:border-brand-500 focus:outline-none"
        />
      </div>

      <div>
        <label for="password" class="block text-sm font-medium text-brand-900">Contraseña</label>
        <input
          id="password"
          type="password"
          formControlName="password"
          class="mt-1 w-full rounded border border-brand-200 px-3 py-2 focus:border-brand-500 focus:outline-none"
        />
      </div>

      @if (errorMessage()) {
        <p class="text-sm text-status-expired">{{ errorMessage() }}</p>
      }

      <button
        type="submit"
        [disabled]="submitting()"
        class="w-full rounded bg-brand-600 py-2 text-white hover:bg-brand-700 disabled:opacity-50"
      >
        Crear cuenta
      </button>
    </form>

    <button
      type="button"
      (click)="submitWithGoogle()"
      [disabled]="submitting()"
      class="mt-3 w-full rounded border border-brand-200 py-2 text-brand-900 hover:bg-brand-50 disabled:opacity-50"
    >
      Continuar con Google
    </button>

    <p class="mt-6 text-center text-sm text-brand-900">
      ¿Ya tenés cuenta? <a routerLink="/auth/login" class="underline">Iniciá sesión</a>
    </p>
  </div>
</div>
