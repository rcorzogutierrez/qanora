@if (account(); as acc) {
  @if (acc.plan === 'trial') {
    <app-trial-banner [daysRemaining]="daysRemaining()" />
  }

  <div class="mx-auto max-w-2xl px-4 py-10">
    <div class="flex items-center justify-between">
      <h1 class="text-2xl font-semibold text-brand-900">{{ acc.name }}</h1>
      <button type="button" (click)="signOut()" class="text-sm text-brand-900 underline">
        Cerrar sesión
      </button>
    </div>
    <p class="mt-2 text-sm text-brand-900">Plan: {{ acc.plan }}</p>
  </div>
} @else {
  <div class="flex min-h-screen items-center justify-center text-brand-900">Cargando cuenta...</div>
}
