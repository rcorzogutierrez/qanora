@if (account(); as acc) {
  @if (acc.plan === 'trial') {
    <app-trial-banner [daysRemaining]="daysRemaining()" />
  }

  <div class="mx-auto max-w-2xl px-4 py-10">
    <div class="flex items-center justify-between">
      <h1 class="text-2xl font-semibold text-brand-900">{{ acc.name }}</h1>
      <button type="button" (click)="signOut()" class="text-sm text-brand-900 underline">
        Cerrar sesión
      </button>
    </div>
    <p class="mt-2 text-sm text-brand-900">Plan: {{ acc.plan }}</p>

    <a
      routerLink="/codes/new"
      class="mt-6 inline-block rounded bg-brand-600 px-4 py-2 text-sm text-white hover:bg-brand-700"
    >
      Nuevo código QR
    </a>

    <div class="mt-8 space-y-3">
      @for (code of codes(); track code.id) {
        <app-code-card [code]="code" />
      } @empty {
        <p class="text-sm text-brand-900/70">Todavía no creaste ningún código.</p>
      }
    </div>
  </div>
} @else {
  <div class="flex min-h-screen items-center justify-center text-brand-900">Cargando cuenta...</div>
}
